<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XR 高清耳部扫描仪 (90°侧面精确版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; width: 100vw; height: 50vh; background: #000; overflow: hidden; }
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .dashboard { width: 95%; max-width: 450px; padding: 20px; text-align: center; }
        #instruction { font-size: 22px; font-weight: bold; color: #007bff; margin: 15px 0; height: 60px; display: flex; align-items: center; justify-content: center; }
        .task-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .task { font-size: 11px; opacity: 0.2; transition: 0.3s; padding: 5px; border: 1px solid #ddd; border-radius: 6px; background: #f9f9f9; }
        .task.active { opacity: 1; border-color: #007bff; background: #e7f3ff; font-weight: bold; }
        .task.done { opacity: 1; background: #d4edda; border-color: #28a745; color: #155724; }
        button { width: 100%; padding: 18px; font-size: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
        #start_btn { background: #007bff; color: #fff; }
        #view_btn { background: #28a745; color: #fff; display: none; }
    </style>
</head>
<body>
    <div id="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <div class="dashboard">
        <div id="instruction">神经网络加载中...</div>
        <div class="task-grid">
            <div class="task" id="t_front">正脸</div>
            <div class="task" id="t_up">仰头</div>
            <div class="task" id="t_down">俯头</div>
            <div class="task" id="t_left45">左转45°</div>
            <div class="task" id="t_left90">左侧(露耳)</div>
            <div class="task" id="t_right45">右转45°</div>
            <div class="task" id="t_right90">右侧(露耳)</div>
        </div>
        <button id="start_btn" disabled>请稍候...</button>
        <button id="view_btn">查看 3D 精准模型</button>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start_btn');
        const viewBtn = document.getElementById('view_btn');

        let scanPhase = 'idle', poseStartTime = 0, faceData = null, cameraAspect = 1.0;
        const LOCK_TIME = 1500; 
        let textures = { front:null, up:null, down:null, left45:null, left90:null, right45:null, right90:null };

        const phases = ['front', 'up', 'down', 'left45', 'left90', 'right45', 'right90'];
        const phasePrompts = {
            front: "请正对屏幕", up: "请稍微仰头", down: "请稍微低头",
            left45: "向左转 45 度", left90: "继续向左转，露出右耳全貌",
            right45: "向右转 45 度", right90: "继续向右转，露出左耳全貌"
        };

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'zh-CN';
            window.speechSynthesis.speak(m);
        }

        const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        function getPose(landmarks) {
            const nose = landmarks[1], left = landmarks[234], right = landmarks[454], top = landmarks[10], bot = landmarks[152];
            const hRatio = (nose.x - left.x) / (right.x - left.x); // 0.5为正，接近0或1为侧
            const vRatio = (nose.y - top.y) / (bot.y - top.y);
            
            if (vRatio < 0.35) return 'up';
            if (vRatio > 0.65) return 'down';
            
            // 精确侧向判定
            if (hRatio > 0.85) return 'left90'; 
            if (hRatio > 0.65) return 'left45';
            if (hRatio < 0.15) return 'right90';
            if (hRatio < 0.35) return 'right45';
            
            if (hRatio > 0.4 && hRatio < 0.6) return 'front';
            return 'transition';
        }

        faceMesh.onResults((res) => {
            const w = videoElement.videoWidth, h = videoElement.videoHeight;
            if (!w) return;
            cameraAspect = h / w;
            canvasElement.width = w; canvasElement.height = h;
            canvasCtx.save();
            canvasCtx.translate(w, 0); canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(res.image, 0, 0, w, h);
            canvasCtx.restore();

            if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                const face = res.multiFaceLandmarks[0];
                if (scanPhase === 'idle') {
                    startBtn.disabled = false; startBtn.innerText = "开始精确扫描";
                    instruction.innerText = "准备好后点击下方按钮"; return;
                }

                if (phases.includes(scanPhase)) {
                    const currentPose = getPose(face);
                    if (currentPose === scanPhase) {
                        if (!poseStartTime) { poseStartTime = Date.now(); speak("请稳住"); }
                        const elapsed = Date.now() - poseStartTime;
                        const remaining = Math.ceil((LOCK_TIME - elapsed) / 1000);
                        if (remaining > 0) {
                            instruction.innerText = `锁定中... ${remaining}`;
                        } else {
                            textures[scanPhase] = captureFrame(res, w, h);
                            if (scanPhase === 'front') faceData = face.map(p => ({x:p.x, y:p.y, z:p.z}));
                            document.getElementById('t_' + scanPhase).className = 'task done';
                            const nextIdx = phases.indexOf(scanPhase) + 1;
                            if (nextIdx < phases.length) {
                                scanPhase = phases[nextIdx]; poseStartTime = 0;
                                document.getElementById('t_' + scanPhase).className = 'task active';
                                speak(phasePrompts[scanPhase]);
                            } else {
                                scanPhase = 'done'; speak("扫描完成"); instruction.innerText = "可以生成模型了";
                                viewBtn.style.display = 'block';
                            }
                        }
                    } else { poseStartTime = 0; instruction.innerText = phasePrompts[scanPhase]; }
                }
            }
        });

        function captureFrame(res, w, h) {
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            ctx.translate(w, 0); ctx.scale(-1, 1);
            ctx.drawImage(res.image, 0, 0, w, h);
            return c.toDataURL('image/jpeg', 0.95);
        }

        const camera = new Camera(videoElement, { onFrame: async () => { await faceMesh.send({image: videoElement}); }, width: 1280, height: 720 });
        camera.start();

        startBtn.onclick = () => {
            scanPhase = 'front'; startBtn.style.display = 'none';
            document.getElementById('t_front').className = 'task active';
            speak(phasePrompts.front);
        };

        viewBtn.onclick = () => {
            sessionStorage.setItem('faceData', JSON.stringify(faceData));
            sessionStorage.setItem('textures', JSON.stringify(textures));
            sessionStorage.setItem('aspect', cameraAspect);
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head><title>3D 精准耳朵模型预览</title><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/delaunator@5.0.0/delaunator.min.js"><\/script></head>
                <body style="margin:0; background:#000;">
                    <script>
                        const data = JSON.parse(sessionStorage.getItem('faceData'));
                        const texs = JSON.parse(sessionStorage.getItem('textures'));
                        const aspect = parseFloat(sessionStorage.getItem('aspect'));
                        const scene = new THREE.Scene();
                        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
                        const renderer = new THREE.WebGLRenderer({antialias:true});
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        document.body.appendChild(renderer.domElement);
                        new THREE.OrbitControls(camera, renderer.domElement);

                        const geo = new THREE.BufferGeometry();
                        const pos = [], uv = [], pts2d = [];
                        data.forEach(p => {
                            pos.push((0.5-p.x)*3, (0.5-p.y)*3*aspect, -p.z*3);
                            uv.push(1-p.x, 1-p.y); pts2d.push([p.x, p.y]);
                        });
                        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
                        geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
                        geo.setIndex(new THREE.BufferAttribute(new Uint32Array(Delaunator.from(pts2d).triangles), 1));
                        geo.computeVertexNormals();

                        const loader = new THREE.TextureLoader();
                        const material = new THREE.ShaderMaterial({
                            uniforms: {
                                tF: { value: loader.load(texs.front) },
                                tU: { value: loader.load(texs.up) },
                                tD: { value: loader.load(texs.down) },
                                tL45: { value: loader.load(texs.left45) },
                                tL90: { value: loader.load(texs.left90) },
                                tR45: { value: loader.load(texs.right45) },
                                tR90: { value: loader.load(texs.right90) }
                            },
                            vertexShader: "varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }",
                            fragmentShader: "uniform sampler2D tF,tU,tD,tL45,tL90,tR45,tR90; varying vec2 vUv; void main() { vec4 f = texture2D(tF, vUv); vec4 u = texture2D(tU, vUv); vec4 d = texture2D(tD, vUv); vec4 l45 = texture2D(tL45, vUv); vec4 l90 = texture2D(tL90, vUv); vec4 r45 = texture2D(tR45, vUv); vec4 r90 = texture2D(tR90, vUv); vec4 res = f; float wU = smoothstep(0.7, 0.9, vUv.y); float wD = smoothstep(0.3, 0.1, vUv.y); res = mix(res, u, wU); res = mix(res, d, wD); float wL45 = smoothstep(0.6, 0.8, vUv.x); float wL90 = smoothstep(0.8, 0.95, vUv.x); res = mix(res, l45, wL45); res = mix(res, l90, wL90); float wR45 = smoothstep(0.4, 0.2, vUv.x); float wR90 = smoothstep(0.2, 0.05, vUv.x); res = mix(res, r45, wR45); res = mix(res, r90, wR90); gl_FragColor = res; }",
                            side: THREE.DoubleSide
                        });
                        scene.add(new THREE.Mesh(geo, material));
                        camera.position.z = 2;
                        function anim() { requestAnimationFrame(anim); renderer.render(scene, camera); }
                        anim();
                    <\/script>
                </body></html>
            `);
            win.document.close();
        };
    </script>
</body>
</html>
